<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Preload custom Swifted font for immediate availability -->
    <link rel="preload" href="/Swifted-Regular.otf" as="font" type="font/otf" crossorigin>
    
    <!-- Preconnect to Cloudinary for faster image loading (LCP optimization) -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
    
    <!-- Google Fonts - Non-blocking load with preconnect optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Load fonts asynchronously to prevent render blocking -->
    <link 
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Lato:wght@100&family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" 
      rel="stylesheet"
      media="print" 
      onload="this.media='all'; this.onload=null;"
    >
    <!-- Fallback for browsers without JS -->
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Lato:wght@100&family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    </noscript>
    <meta name="keywords" content="interior design, interior architecture, residential design, The Berkshires, Boston">
    <meta name="author" content="Beckwith Barrow Interior Design">
    <!-- Static fallback title/description are managed per-page by the <Seo> component
         (react-helmet-async). Title stays as a no-JS fallback; description, Open Graph,
         and Twitter tags are emitted per-page at runtime to avoid duplicate meta tags. -->
    <title>Beckwith Barrow Interior Design | The Berkshires & Boston</title>
    <!-- No static robots meta: pages are indexable by default, and the <Seo>
         component emits `noindex` per-page (e.g. Not Found) without a conflicting
         static "index, follow" tag winning the duplicate. -->

    <!-- Structured Data (schema.org JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "ProfessionalService",
          "name": "Beckwith Barrow Interior Design",
          "url": "https://beckwithbarrow.com",
          "description": "A full-service, boutique interior design firm creating upscale, livable interiors across The Berkshires and Boston.",
          "image": "https://res.cloudinary.com/dqeqavdd8/image/upload/v1758995559/demkxyyquntlquyz4wgf.jpg",
          "areaServed": ["The Berkshires", "Boston"]
        },
        {
          "@type": "WebSite",
          "name": "Beckwith Barrow Interior Design",
          "url": "https://beckwithbarrow.com"
        }
      ]
    }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
