name: Weekly Safety Backup
on:
  schedule:
    - cron: '17 7 * * 0'   # 07:17 UTC Sundays (weekly; nightly re-downloaded every original and blew the Cloudinary bandwidth quota)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { lfs: false }   # write-only backup: don't pull existing LFS binaries (saves bandwidth quota)
      - uses: pnpm/action-setup@v4
        with: { version: 10.6.2 }   # required: no packageManager field in package.json
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Hydrate incremental baseline (previous manifest -> /tmp, outside the repo)
        run: |
          # The backup is INCREMENTAL: it downloads only assets that are new or
          # changed since the last backup. Feed it the newest committed manifest
          # from the `backups` branch. Written outside the working tree so it can't
          # interfere with the `git checkout backups` step below.
          git fetch origin backups --depth=1 || true
          PREV=$(git ls-tree -r --name-only origin/backups -- api/backups 2>/dev/null \
            | grep '/cloudinary-manifest.json$' | sort | tail -1 || true)
          if [ -n "$PREV" ]; then
            git show "origin/backups:$PREV" > /tmp/prev-manifest.json
            echo "Baseline: $PREV ($(wc -c < /tmp/prev-manifest.json) bytes)"
          else
            echo "[]" > /tmp/prev-manifest.json
            echo "No previous manifest — full backup this run."
          fi
      - name: Run read-only backup
        working-directory: api
        env:
          STRAPI_CLOUD_BASE_URL: ${{ secrets.STRAPI_CLOUD_BASE_URL }}
          STRAPI_CLOUD_API_TOKEN: ${{ secrets.STRAPI_CLOUD_API_TOKEN }}
          CLOUDINARY_NAME: ${{ secrets.CLOUDINARY_NAME }}
          CLOUDINARY_KEY: ${{ secrets.CLOUDINARY_KEY }}
          CLOUDINARY_SECRET: ${{ secrets.CLOUDINARY_SECRET }}
          BACKUP_BASELINE_MANIFEST: /tmp/prev-manifest.json
        run: pnpm backup:safe   # cwd is api/ (working-directory above); package name is my-strapi-project
      - name: Secret-leak guard
        run: |
          if grep -rIl -E "SECRET|TOKEN|PASSWORD|api_secret" api/backups/; then
            echo "Secrets found in backup output"; exit 1; fi
      # NOTE (decision for repo owner): this pushes backup commits to a dedicated
      # `backups` branch, NOT main — main is protected and "never commit directly to
      # main" per CLAUDE.md. The branch accumulates nightly backup commits; periodically
      # prune old stamp dirs (see retention note in the Pillar 1 plan). Confirm branch
      # protection / LFS quota are acceptable before enabling this workflow.
      - name: Commit backup to dedicated branch
        env:
          HUSKY: "0"   # disable husky hooks in CI (gitleaks isn't installed on the runner)
        run: |
          git config user.name "backup-bot"
          git config user.email "backup-bot@users.noreply.github.com"
          git fetch origin backups || true
          git checkout backups 2>/dev/null || git checkout -b backups
          git add api/backups api/.gitattributes
          if git diff --cached --quiet; then
            echo "No backup changes to commit."
          else
            # --no-verify: the workflow already ran its own secret-leak guard above
            git commit --no-verify -m "chore(backups): weekly $(date -u +%FT%TZ)"
            # push LFS objects first so the ref push isn't rejected (GH008 dangling pointers)
            git lfs push --all origin backups
            git push origin backups
          fi
